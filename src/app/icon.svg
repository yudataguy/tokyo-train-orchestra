<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <!-- Rounded square in Tokyo Metro corporate blue -->
  <rect width="32" height="32" rx="7" fill="#003DA5"/>

  <!-- White train face (front view, looking at the cab) -->
  <rect x="7" y="6.5" width="18" height="20" rx="3.5" fill="#ffffff"/>

  <!-- Roof line / slight taper cue: thin highlight strip -->
  <rect x="8.5" y="7.5" width="15" height="0.6" rx="0.3" fill="#e5e7eb"/>

  <!-- Windshield: single broad window, blue to match the body -->
  <rect x="9.5" y="9.5" width="13" height="7" rx="1.8" fill="#003DA5"/>

  <!-- Destination-sign bar inside the windshield, Metro red accent -->
  <rect x="11" y="11.5" width="10" height="1.2" rx="0.4" fill="#EA5514"/>

  <!-- Headlights (paired, warm accent) -->
  <circle cx="10.5" cy="19.5" r="1.5" fill="#EA5514"/>
  <circle cx="21.5" cy="19.5" r="1.5" fill="#EA5514"/>

  <!-- Coupler / center mark -->
  <rect x="15" y="23" width="2" height="2.5" rx="0.3" fill="#1f2937"/>
</svg>
